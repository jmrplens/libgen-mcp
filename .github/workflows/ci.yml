# CI pipeline for libgen-mcp
#
# Runs on: pull requests to main, pushes to main
# Jobs: test (+coverage gate), build, golangci-lint, godoc, govulncheck, markdown,
#       hadolint, docker build (PR + Docker changes only), docs-site (Astro lint + a11y-less checks)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"
  COVERAGE_MIN: "85"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Run tests with coverage
        run: |
          go test -count=1 -coverpkg=./internal/... -coverprofile=coverage.out ./cmd/... ./internal/...
          go tool cover -func=coverage.out | tail -1
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage (internal/): ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE} + 0 < ${COVERAGE_MIN} + 0)}"; then
            echo "FAIL: coverage ${COVERAGE}% is below minimum ${COVERAGE_MIN}%"
            exit 1
          fi
          echo "PASS: coverage ${COVERAGE}% meets minimum ${COVERAGE_MIN}%"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  sonarcloud:
    name: "SA: SonarCloud"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: coverage
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v8
        continue-on-error: true
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server-json:
    name: server.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install jsonschema
        run: pip install --quiet jsonschema
      - name: Version matches VERSION file
        run: |
          set -euo pipefail
          SJ=$(jq -r '.version' server.json)
          VF=$(tr -d '[:space:]' < VERSION)
          echo "server.json=$SJ VERSION=$VF"
          [ "$SJ" = "$VF" ] || { echo "::error::server.json version ($SJ) != VERSION ($VF)"; exit 1; }
      - name: Validate server.json against the MCP Registry schema
        run: |
          set -euo pipefail
          SCHEMA_URL=$(jq -r '."$schema"' server.json)
          echo "Schema: $SCHEMA_URL"
          # SSRF guard: only the official MCP Registry schema host is allowed.
          ALLOWED_PREFIX="https://static.modelcontextprotocol.io/"
          case "$SCHEMA_URL" in
            "$ALLOWED_PREFIX"*) ;;
            *) echo "::error::Schema URL must start with $ALLOWED_PREFIX (got: $SCHEMA_URL)"; exit 1 ;;
          esac
          curl -fsSL --proto '=https' --tlsv1.2 "$SCHEMA_URL" -o /tmp/mcp-schema.json
          python3 -c "import json,jsonschema; \
            schema=json.load(open('/tmp/mcp-schema.json')); \
            inst=json.load(open('server.json')); \
            jsonschema.validate(inst, schema); \
            print('server.json: VALID')"
      - name: Validate mcpb/manifest.json parses and matches VERSION
        run: |
          set -euo pipefail
          jq empty mcpb/manifest.json && echo "mcpb/manifest.json: valid JSON"
          MV=$(jq -r '.version' mcpb/manifest.json)
          VF=$(tr -d '[:space:]' < VERSION)
          echo "mcpb/manifest.json=$MV VERSION=$VF"
          [ "$MV" = "$VF" ] || { echo "::error::mcpb/manifest.json version ($MV) != VERSION ($VF)"; exit 1; }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Build server and probe
        run: |
          go build -o /dev/null ./cmd/server
          go build -o /dev/null ./cmd/probe
      - name: Verify e2e tests compile
        run: go test -tags e2e -c -o /dev/null ./test/e2e/
      - name: Check Markdown tables are formatted
        run: go run ./cmd/format_md_tables/ --check
      - name: Check generated llms files are current
        run: go run ./cmd/gen_llms/ --check

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: make golangci-lint

  godoc:
    name: godoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - name: Audit godoc coverage (exported symbols, packages and tests)
        run: go run ./cmd/godoc_tool/ audit --include-tests --fail-on-findings

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: make govulncheck

  analyze-md:
    name: Analyze Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npx --yes markdownlint-cli2 "**/*.md"

  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3018

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for Docker changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- Dockerfile .dockerignore)
          if [ -n "$CHANGED" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
            echo "No Docker-related files changed — skipping build"
          fi
      - name: Build Docker image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}

  docs-site:
    name: Docs Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: site/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site
        env:
          # The lint job does not run pa11y, so skip puppeteer's Chromium download.
          PUPPETEER_SKIP_DOWNLOAD: "true"
      - name: Build the site
        run: pnpm run build
        working-directory: site
      - name: Lint (astro check, i18n parity, eslint, prettier, html-validate, htmlhint)
        run: pnpm run lint
        working-directory: site

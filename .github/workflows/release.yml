# Release pipeline for libgen-mcp
#
# Triggers: tag push matching v*
# Pipeline: GoReleaser (binaries + checksums + changelog + cosign + SBOM)
#           and a signed multi-arch Docker image on ghcr.io.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26.5"
  REGISTRY: ghcr.io
  IMAGE_NAME: jmrplens/libgen-mcp
  DOCKERHUB_IMAGE: jmrplens/libgen-mcp

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: sigstore/cosign-installer@v4.1.2
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and upload the .mcpb Claude Desktop bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash scripts/build-mcpb.sh "${VERSION}"
          gh release upload "v${VERSION}" dist/libgen-mcp.mcpb --clobber

      - name: Pin server.json version and SHA256 hashes
        run: bash scripts/update-server-json-sha.sh dist/checksums.txt "${GITHUB_REF#refs/tags/v}"

      # Publishing to the public MCP Registry only makes sense once the repo and
      # its release assets are public. This step auto-skips while the repo is
      # private and activates automatically when it is made public.
      - name: Publish to MCP Registry
        if: ${{ github.event.repository.private == false }}
        env:
          MCP_PUBLISHER_VERSION: "v1.7.8"
          MCP_PUBLISHER_SHA256: "48230dbec85bd88a0d42977ef533cddda23235f0db4331b9263ce53b432cb75c"
        run: |
          set -euo pipefail
          TARBALL="mcp-publisher_linux_amd64.tar.gz"
          SIGSTORE_BUNDLE="${TARBALL}.sigstore.json"
          URL="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${TARBALL}"
          curl -fsSL --proto '=https' --tlsv1.2 --retry 3 --retry-connrefused -o "${TARBALL}" "${URL}"
          curl -fsSL --proto '=https' --tlsv1.2 --retry 3 --retry-connrefused -o "${SIGSTORE_BUNDLE}" "${URL}.sigstore.json"
          echo "${MCP_PUBLISHER_SHA256}  ${TARBALL}" | sha256sum -c -
          cosign verify-blob \
            --bundle "${SIGSTORE_BUNDLE}" \
            --certificate-identity "https://github.com/modelcontextprotocol/registry/.github/workflows/release.yml@refs/tags/${MCP_PUBLISHER_VERSION}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${TARBALL}"
          tar xzf "${TARBALL}" mcp-publisher
          ./mcp-publisher login github-oidc
          set +e
          ./mcp-publisher publish 2>&1 | tee mcp-publisher-publish.log
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "${STATUS}" -ne 0 ]; then
            if grep -q "invalid version: cannot publish duplicate version" mcp-publisher-publish.log; then
              echo "::notice::MCP Registry version already published; continuing"
            else
              exit "${STATUS}"
            fi
          fi

      - name: Commit pinned server.json back to main
        if: ${{ github.event.repository.private == false }}
        env:
          RELEASE_DEPLOY_KEY_B64: ${{ secrets.RELEASE_DEPLOY_KEY_B64 }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"

          # main is protected by a ruleset. Push over SSH with a write-enabled
          # deploy key, which the ruleset's DeployKey bypass allows.
          if [ -z "${RELEASE_DEPLOY_KEY_B64:-}" ]; then
            echo "::warning::RELEASE_DEPLOY_KEY_B64 not set — skipping the server.json pin-back to main."
            exit 0
          fi
          KEY_FILE="${RUNNER_TEMP}/release_deploy_key"
          KNOWN_HOSTS_FILE="${RUNNER_TEMP}/known_hosts"
          echo "${RELEASE_DEPLOY_KEY_B64}" | base64 --decode > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          ssh-keyscan -H github.com > "${KNOWN_HOSTS_FILE}" 2>/dev/null

          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git config core.sshCommand "ssh -i ${KEY_FILE} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${KNOWN_HOSTS_FILE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main
          bash scripts/update-server-json-sha.sh dist/checksums.txt "${VERSION}"
          git add server.json
          if git diff --cached --quiet; then
            echo "::notice::No server.json changes to commit"
            exit 0
          fi
          git commit -m "chore: pin server.json for v${VERSION}"
          git push origin main

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@v4.1.2
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check Docker Hub credentials
        id: dockerhub-login
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set — skipping Docker Hub publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.dockerhub-login.outputs.skip == 'false'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute build date
        id: build-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        id: docker-push
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.date }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.dockerhub-login.outputs.skip == 'false' && format('docker.io/{0}:{1}', env.DOCKERHUB_IMAGE, steps.version.outputs.version) || '' }}
            ${{ steps.dockerhub-login.outputs.skip == 'false' && format('docker.io/{0}:latest', env.DOCKERHUB_IMAGE) || '' }}
      - name: Sign Docker image (ghcr.io)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker-push.outputs.digest }}
      - name: Sign Docker image (docker.io)
        if: steps.dockerhub-login.outputs.skip == 'false'
        run: |
          cosign sign --yes \
            docker.io/${{ env.DOCKERHUB_IMAGE }}@${{ steps.docker-push.outputs.digest }}

  # Deploy the tagged release to the public Fly.io instance
  # (https://libgen-mcp.fly.dev/). Skips silently when FLY_API_TOKEN is not
  # configured, so a fork or a token-less setup never fails the release.
  fly-deploy:
    name: Fly.io Deploy
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: ${{ github.repository == 'jmrplens/libgen-mcp' }}
    steps:
      - uses: actions/checkout@v7

      - name: Check FLY_API_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN not set — skipping Fly.io deployment."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install flyctl
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Deploy to Fly.io
        if: steps.check.outputs.skip == 'false'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly deploy --remote-only \
            --config fly.toml \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --build-arg COMMIT=${{ github.sha }} \
            --image-label v${{ steps.version.outputs.version }} \
            --ha=false \
            --strategy immediate

      - name: Verify deployment health
        if: steps.check.outputs.skip == 'false'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly status --config fly.toml

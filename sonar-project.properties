# SonarCloud configuration for libgen-mcp

sonar.projectKey=jmrplens_libgen-mcp
sonar.organization=jmrplens
sonar.projectName=libgen-mcp

# Source and test directories
sonar.sources=cmd,internal
sonar.tests=internal
sonar.test.inclusions=**/*_test.go

# Coverage report (generated by CI)
sonar.go.coverage.reportPaths=coverage.out

# cmd/ is thin wiring (server) and a live-network diagnostic (probe); neither
# yields useful unit-level coverage. Still analyzed for issues, excluded from
# the coverage metric.
sonar.coverage.exclusions=cmd/**

# Excluded from analysis:
#  - VERSION: non-code file (triggers the C/C++ analyzer).
#  - **/testdata/**: captured HTML/JSON fixtures for the parser tests. They are
#    external site captures, not project source; two search pages share ~90% of
#    the LibGen page chrome, which otherwise dominates the duplication metric.
sonar.exclusions=VERSION,**/testdata/**

# ── Rule exclusions for Go test files (idiomatic patterns Sonar over-flags) ──
sonar.issue.ignore.multicriteria=t1,t2,t3,t4,g1

# S1192 — duplicated string literals in table-driven tests / httptest mocks
sonar.issue.ignore.multicriteria.t1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*_test.go

# S1186 — empty function body (httptest handler mocks)
sonar.issue.ignore.multicriteria.t2.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.t2.resourceKey=**/*_test.go

# S100 — Go test names use underscores (TestFoo_Bar)
sonar.issue.ignore.multicriteria.t3.ruleKey=go:S100
sonar.issue.ignore.multicriteria.t3.resourceKey=**/*_test.go

# S3776 — cognitive complexity in test helpers
sonar.issue.ignore.multicriteria.t4.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.t4.resourceKey=**/*_test.go

# S1135 — TODO/FIXME tracking annotations are not quality issues
sonar.issue.ignore.multicriteria.g1.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.g1.resourceKey=**/*.go

# markdownlint-cli2 configuration for libgen-mcp
# Docs: https://github.com/DavidAnson/markdownlint-cli2
config:
  default: true
  MD013: false # line length — prose and tables run long
  MD033: false # inline HTML — allowed in README
  MD041: false # first line need not be a top-level heading
  MD060: false # table pipe alignment — cosmetic, not enforced
globs:
  - "**/*.md"
ignores:
  # A run report written by the evaluator, versioned so the results pages can be
  # regenerated and checked. It is a machine artifact, not prose.
  - cmd/eval/testdata/latest-run.md
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.astro/**"
  - docs/superpowers
  - .superpowers

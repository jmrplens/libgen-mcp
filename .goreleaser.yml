# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser configuration for libgen-mcp.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod download

builds:
  - id: libgen-mcp
    main: ./cmd/server
    binary: libgen-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildmode=pie
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    # Reproducible builds: stamp binary mtime from the commit timestamp.
    mod_timestamp: "{{ .CommitTimestamp }}"

# Fuse the darwin amd64 + arm64 builds into a single universal ("fat") binary.
# The .mcpb Claude Desktop bundle ships this one file so it runs on both Intel
# and Apple Silicon Macs. `replace: false` keeps the per-arch binaries too.
universal_binaries:
  - id: libgen-mcp-universal
    ids:
      - libgen-mcp
    name_template: libgen-mcp
    replace: false
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: binaries
    formats: [binary]
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  groups:
    - title: "✨ Features"
      regexp: "^.*?feat(\\(.+?\\))??!?:.+$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*?fix(\\(.+?\\))??!?:.+$"
      order: 1
    - title: "🔒 Security"
      regexp: "^.*?(sec|security)(\\(.+?\\))??!?:.+$"
      order: 2
    - title: "⚡ Performance"
      regexp: "^.*?perf(\\(.+?\\))??!?:.+$"
      order: 3
    - title: "📚 Documentation"
      regexp: "^.*?docs(\\(.+?\\))??!?:.+$"
      order: 4
    - title: "🚧 Maintenance"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "(?i)typo"
      - "^Merge pull request"
      - "^Merge branch"

signs:
  # Keyless cosign signature over the checksums file (sigstore bundle).
  # Verify with: cosign verify-blob --bundle checksums.txt.sigstore.json checksums.txt
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    output: true
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}

sboms:
  - artifacts: archive
    cmd: syft
    args:
      - scan
      - ${artifact}
      - --output
      - spdx-json=${document}

release:
  github:
    owner: jmrplens
    name: libgen-mcp
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
